version: '3.8'
services:
  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - '5000:5000'
    environment:
      - FLASK_ENV=development
    command: ["python", "backend/app.py"]
# Note: For production, add a proper Dockerfile, uWSGI/Gunicorn and a production DB service
